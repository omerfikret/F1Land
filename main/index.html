<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1Land</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<!-- ÜST BAR (sol, orta, sağ) -->
<nav class="topbar">
    <!-- SOL: Logo + Yenile -->
    <div class="topbar-left">
        <div class="topbar-brand">
            <i class="fas fa-flag-checkered"></i>
            <span>F1Land</span>
        </div>
        <button class="sync-btn" id="syncBtn"><i class="fas fa-sync"></i> Yenile</button>
    </div>

    <!-- ORTA: Menü -->
    <div class="topbar-center" id="navMenu">
        <div class="topbar-item active" data-page="1">
            <i class="fas fa-home"></i> Ana Sayfa
        </div>
        <div class="topbar-item" data-page="2">
            <i class="fas fa-info-circle"></i> Hakkında
        </div>
        <div class="topbar-item" data-page="3">
            <i class="fas fa-history"></i> Tarihçe
        </div>
        <div class="topbar-item" data-page="4">
            <i class="fas fa-gavel"></i> Kurallar
        </div>
    </div>

    <!-- SAĞ: Sezon + Durum -->
    <div class="topbar-right">
        <div class="topbar-year">
            <label for="yearSelect">Sezon</label>
            <select id="yearSelect"></select>
        </div>
        <div id="syncStatus"></div>
    </div>
</nav>

<!-- ANA İÇERİK -->
<main class="main-content" id="mainContent">
    <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Veriler yükleniyor...</div>
</main>

<script src="js/api.js"></script>
<script src="js/helpers.js"></script>
<script src="js/navigation.js"></script>
<script src="js/page1.js"></script>
<script src="js/about.js"></script>
<script src="js/history.js"></script>
<script src="js/rules.js"></script>
<script src="js/detail.js"></script>
<script src="js/app.js"></script>

</body>
</html>
