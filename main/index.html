<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1Land | Formula 1 Bilgi Merkezi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-brand">
        <i class="fas fa-flag-checkered"></i>
        <span>F1Land</span>
    </div>

    <div class="year-select-wrap">
        <label for="yearSelect">Sezon (Sayfa 2 & 3)</label>
        <select id="yearSelect"></select>
    </div>

    <div class="nav-menu" id="navMenu">
        <div class="nav-item active" data-page="1">
            <i class="fas fa-database"></i>
            <div>
                Sayfa 1 — Genel
                <small>season · circuit · status</small>
            </div>
        </div>
        <div class="nav-item" data-page="2">
            <i class="fas fa-users"></i>
            <div>
                Sayfa 2 — Sezon
                <small>race · driver · constructor</small>
            </div>
        </div>
        <div class="nav-item" data-page="3">
            <i class="fas fa-chart-line"></i>
            <div>
                Sayfa 3 — Sonuçlar
                <small>standings · results · sprint · qualifying</small>
            </div>
        </div>
    </div>

    <div class="sidebar-footer">
        Jolpi Ergast API
        <button class="sync-btn" id="syncBtn">
            <i class="fas fa-sync"></i> Yenile
        </button>
        <div id="syncStatus"></div>
    </div>
</nav>

<main class="main-content" id="mainContent">
    <div class="loading">
        <i class="fas fa-spinner fa-pulse"></i> Veriler yükleniyor...
    </div>
</main>

<!-- JavaScript -->
<script src="js/api.js"></script>
<script src="js/helpers.js"></script>
<script src="js/navigation.js"></script>
<script src="js/page1.js"></script>
<script src="js/page2.js"></script>
<script src="js/page3.js"></script>
<script src="js/detail.js"></script>
<script src="js/app.js"></script>
</body>
</html>
